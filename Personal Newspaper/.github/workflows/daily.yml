name: Daily Brief

on:
  workflow_dispatch:
  schedule:
    # Runs at 10:30 UTC, about 5:30 AM Chicago during standard time.
    # Daylight saving time shifts this by an hour, and GitHub cron can run a few minutes late.
    - cron: "30 10 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-brief-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate daily site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit generated edition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site topics.json trivia_history.json state.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Generate daily brief for $(TZ=America/Chicago date +%F)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
