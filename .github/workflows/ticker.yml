name: News Ticker

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-brief-pages
  cancel-in-progress: false

jobs:
  ticker:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update ticker
        run: python ticker.py

      - name: Commit ticker if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/ticker.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Ticker unchanged."
          else
            git commit -m "Update news ticker"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for site
        id: site
        run: |
          if [ -f site/index.html ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true' && steps.site.outputs.exists == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true' && steps.site.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true' && steps.site.outputs.exists == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
